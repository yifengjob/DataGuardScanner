name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 64-bit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            args: ""
          
          # Windows 32-bit
          - os: windows-latest
            target: i686-pc-windows-msvc
            platform: windows-x86
            args: ""
          
          # Linux x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            args: ""
          
          # macOS Intel
          - os: macos-15
            target: x86_64-apple-darwin
            platform: macos-intel
            args: ""
          
          # macOS Apple Silicon (ARM)
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pnpm first
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Install Rust toolchain
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            desktop-file-utils \
            libfuse2

      # Cache Rust dependencies
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Cache Node modules (disabled to avoid stale cache issues)
      # - name: Cache Node modules
      #   uses: actions/cache@v4
      #   with:
      #     path: frontend/node_modules
      #     key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      #     restore-keys: |
      #       ${{ runner.os }}-pnpm-

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      # Build Tauri app (installer version)
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --target ${{ matrix.target }} ${{ matrix.args }}

      # Build Windows portable EXE (additional)
      - name: Build Windows Portable EXE
        if: startsWith(matrix.platform, 'windows')
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }}
          
      # Debug: List build outputs
      - name: List build outputs
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          Write-Host "=== Checking target directory ==="
          Get-ChildItem -Path "target/${{ matrix.target }}/release/" -Filter "*.exe" | Select-Object Name, Length
          Write-Host "=== Checking if dataguard-scanner.exe exists ==="
          Test-Path "target/${{ matrix.target }}/release/dataguard-scanner.exe"

      # Upload artifacts
      - name: Upload Windows artifacts
        if: startsWith(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: dataguard-scanner-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: dataguard-scanner-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: dataguard-scanner-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error

      # Upload Windows portable EXE separately
      - name: Upload Windows Portable EXE
        if: startsWith(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: dataguard-scanner-${{ matrix.platform }}-portable
          path: target/${{ matrix.target }}/release/*.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.app
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
